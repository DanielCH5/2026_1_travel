{% include "_header.html" %}

     <form method="POST" action="/api-login" id="loginForm">
        <input id="userEmail" name="user_email" type="email" placeholder="email" data-regex="{{x.REGEX_USER_EMAIL}}">
        <input id="userPassword" name="user_password" type="password" placeholder="password" data-regex="{{x.REGEX_USER_PASSWORD}}" data-min="{{x.USER_PASSWORD_MIN}}" data-max="{{x.USER_PASSWORD_MAX}}">
        <button>
            Login
        </button>
    </form>


    <ul id="loginMessages">
        
    </ul>
    <script src="/static/login.js" type="module"></script>
{% include "_footer.html" %}
